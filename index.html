<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Morgennyheter</title>
<style>
  :root{
    --bg:#f4f5f7; --card:#ffffff; --ink:#1a1d21; --muted:#5f6672;
    --accent:#0b57d0; --accent-ink:#fff; --tech:#7c3aed; --line:#e3e6ea;
    --radius:12px;
  }
  @media (prefers-color-scheme: dark){
    :root{--bg:#14161a; --card:#1e2126; --ink:#e8eaed; --muted:#9aa1ab; --line:#2c3138; --accent:#8ab4f8; --accent-ink:#14161a; --tech:#b794f6;}
  }
  *{box-sizing:border-box}
  body{margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; background:var(--bg); color:var(--ink); line-height:1.45;}
  header{padding:28px 20px 12px; max-width:1200px; margin:0 auto;}
  h1{margin:0 0 2px; font-size:1.7rem;}
  .date{color:var(--muted); text-transform:capitalize;}
  .toolbar{display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-top:14px;}
  button{border:0; border-radius:8px; padding:9px 16px; font-size:.95rem; cursor:pointer; background:var(--accent); color:var(--accent-ink); font-weight:600;}
  button.secondary{background:transparent; color:var(--accent); border:1px solid var(--accent); font-weight:500;}
  button:disabled{opacity:.55; cursor:wait;}
  .status{color:var(--muted); font-size:.85rem;}
  #addForm{display:none; gap:8px; flex-wrap:wrap; margin-top:12px; padding:14px; background:var(--card); border:1px solid var(--line); border-radius:var(--radius); width:100%;}
  #addForm input{flex:1 1 180px; padding:9px 12px; border:1px solid var(--line); border-radius:8px; background:var(--bg); color:var(--ink); font-size:.95rem;}
  #addForm .hint{flex-basis:100%; font-size:.8rem; color:var(--muted); margin:0;}
  main{max-width:1200px; margin:0 auto; padding:8px 20px 48px;}
  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(330px,1fr)); gap:16px;}
  section.feed{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:16px 18px;}
  section.tech{grid-column:1 / -1; border-left:4px solid var(--tech);}
  section h2{margin:0 0 10px; font-size:1.05rem; display:flex; align-items:center; gap:8px;}
  section.tech h2{color:var(--tech);}
  .badge{font-size:.7rem; background:var(--tech); color:#fff; border-radius:20px; padding:2px 8px; font-weight:600;}
  .src-badge{font-size:.7rem; color:var(--muted); border:1px solid var(--line); border-radius:20px; padding:1px 7px; white-space:nowrap;}
  ul{list-style:none; margin:0; padding:0;}
  li{padding:9px 0; border-top:1px solid var(--line);}
  li:first-child{border-top:0;}
  li a{color:var(--ink); text-decoration:none; font-weight:600; font-size:.95rem;}
  li a:hover{color:var(--accent); text-decoration:underline;}
  .desc{margin:3px 0 0; font-size:.85rem; color:var(--muted);}
  .meta{margin-top:3px; font-size:.75rem; color:var(--muted); display:flex; gap:8px; align-items:center;}
  .removeFeed{background:none; border:0; color:var(--muted); font-size:.75rem; cursor:pointer; padding:0; text-decoration:underline; font-weight:400;}
  .err{color:#c0392b; font-size:.85rem;}
  .empty{color:var(--muted); font-size:.85rem; font-style:italic;}
</style>
</head>
<body>
<header>
  <h1>Morgennyheter</h1>
  <div class="date" id="dateLine"></div>
  <div class="toolbar">
    <button id="refreshBtn">&#8635; Oppdater</button>
    <button class="secondary" id="toggleAdd">+ Legg til RSS-feed</button>
    <button class="secondary" id="resetFeeds" style="display:none" title="Hent tilbake fjernede standardkilder">Tilbakestill kilder</button>
    <span class="status" id="status"></span>
  </div>
  <form id="addForm">
    <input id="feedName" placeholder="Navn (f.eks. NRK Beta)" required>
    <input id="feedUrl" type="url" placeholder="https://…/rss" required>
    <button type="submit">Legg til</button>
    <p class="hint">Lim inn adressen til en RSS-feed. Egne feeder lagres lokalt i nettleseren din og hentes på nytt hver gang du oppdaterer.</p>
  </form>
</header>
<main>
  <div class="grid" id="grid"></div>
</main>
<script>
"use strict";
const DEFAULT_FEEDS = [
  {name:"Aftenposten", url:"https://www.aftenposten.no/rss"},
  {name:"VG", url:"https://www.vg.no/rss/feed"},
  {name:"DN", url:"https://services.dn.no/api/feed/rss/"},
  {name:"Budstikka", url:"https://www.budstikka.no/service/rich-rss"},
  {name:"Morgenbladet", url:"https://news.google.com/rss/search?q=site:morgenbladet.no&hl=no&gl=NO&ceid=NO:no"},
  {name:"Digi.no", url:"https://www.digi.no/feeds/general.xml", tech:true}
];
const MAX_ITEMS = 5;
const TECH_RE = /\b(teknologi|tech|cyber|cybersikkerhet|datasikkerhet|IT-|hacker|hacking|dataangrep|løsepengevirus|KI|kunstig intelligens|\bAI\b|ChatGPT|digitalisering|digitale?\b|telekom|Telenor|Telia|databrudd|personvern|skytjeneste|datasenter|programvare|app\b|apper\b|smartbriller|droner?\b|forsvarsteknologi|satellitt|chip\b|halvleder|kvantedata)/i;

const store = {
  get(){ try{return JSON.parse(localStorage.getItem("customFeeds")||"[]")}catch(e){return[]} },
  set(v){ try{localStorage.setItem("customFeeds", JSON.stringify(v))}catch(e){} },
  hidden(){ try{return JSON.parse(localStorage.getItem("hiddenFeeds")||"[]")}catch(e){return[]} },
  setHidden(v){ try{localStorage.setItem("hiddenFeeds", JSON.stringify(v))}catch(e){} }
};

function feeds(){
  const hidden = store.hidden();
  return DEFAULT_FEEDS.filter(f=>!hidden.includes(f.url)).concat(store.get());
}

function esc(s){ const d=document.createElement("div"); d.textContent=s==null?"":String(s); return d.innerHTML; }
function stripHtml(s){ const d=document.createElement("div"); d.innerHTML=s||""; return (d.textContent||"").trim(); }

function cleanTitle(t, feedName){
  t = (t||"").trim();
  if(feedName==="Morgenbladet") t = t.replace(/\s*-\s*Morgenbladet\s*$/,"");
  return t;
}

function fmtTime(iso){
  if(!iso) return "";
  const d = new Date((iso||"").replace(" ","T"));
  if(isNaN(d)) return "";
  return d.toLocaleString("nb-NO",{weekday:"short", hour:"2-digit", minute:"2-digit", day:"numeric", month:"short"});
}

async function fetchFeed(feed){
  const api = "https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(feed.url);
  const ctrl = new AbortController();
  const timer = setTimeout(()=>ctrl.abort(), 20000);
  try{
    // Prøv direkte først (noen feeder tillater det), ellers via rss2json.
    let items = null;
    try{
      const r = await fetch(feed.url, {signal:ctrl.signal});
      if(r.ok){
        const xml = new DOMParser().parseFromString(await r.text(), "text/xml");
        const nodes = [...xml.querySelectorAll("item")];
        if(nodes.length){
          items = nodes.map(n=>({
            title: n.querySelector("title")?.textContent,
            link: n.querySelector("link")?.textContent,
            pubDate: n.querySelector("pubDate")?.textContent,
            description: n.querySelector("description")?.textContent
          }));
        }
      }
    }catch(e){ /* CORS – fall tilbake til rss2json */ }
    if(!items){
      const r = await fetch(api, {signal:ctrl.signal});
      const j = await r.json();
      if(j.status!=="ok") throw new Error(j.message||"rss2json-feil");
      items = j.items||[];
    }
    items.sort((a,b)=>new Date(b.pubDate||0)-new Date(a.pubDate||0));
    return {feed, items: items.slice(0, feed.custom?8:12).map(i=>({
      title: cleanTitle(i.title, feed.name),
      link: i.link,
      pubDate: i.pubDate,
      desc: stripHtml(i.description).slice(0,180)
    }))};
  }catch(e){
    return {feed, error: e.name==="AbortError" ? "Tidsavbrudd" : String(e.message||e)};
  }finally{ clearTimeout(timer); }
}

function itemHtml(it, withSource){
  return `<li>
    <a href="${esc(it.link)}" target="_blank" rel="noopener">${esc(it.title)}</a>
    ${it.desc?`<p class="desc">${esc(it.desc)}${it.desc.length>=180?"…":""}</p>`:""}
    <div class="meta">${withSource?`<span class="src-badge">${esc(it.source)}</span>`:""}<span>${esc(fmtTime(it.pubDate))}</span></div>
  </li>`;
}

function render(results){
  const grid = document.getElementById("grid");
  // Tech-fokus på tvers av kilder
  const techItems = [];
  for(const r of results){
    if(r.items) for(const it of r.items){
      if(r.feed.tech || TECH_RE.test(it.title+" "+(it.desc||""))) techItems.push({...it, source:r.feed.name});
    }
  }
  techItems.sort((a,b)=>new Date(b.pubDate||0)-new Date(a.pubDate||0));

  let html = `<section class="feed tech"><h2>Tech-fokus <span class="badge">IT &amp; cyber</span></h2>`;
  html += techItems.length
    ? `<ul>${techItems.slice(0,8).map(i=>itemHtml(i,true)).join("")}</ul>`
    : `<p class="empty">Ingen tydelige tech-saker i feedene akkurat nå.</p>`;
  html += `</section>`;

  for(const r of results){
    html += `<section class="feed"><h2>${esc(r.feed.name)} <button class="removeFeed" data-url="${esc(r.feed.url)}" data-custom="${r.feed.custom?1:0}" title="Fjern denne kilden">fjern</button></h2>`;
    if(r.error) html += `<p class="err">Kunne ikke hente: ${esc(r.error)}</p>`;
    else if(!r.items.length) html += `<p class="empty">Ingen saker funnet.</p>`;
    else html += `<ul>${r.items.slice(0,MAX_ITEMS).map(i=>itemHtml(i,false)).join("")}</ul>`;
    html += `</section>`;
  }
  grid.innerHTML = html;
  grid.querySelectorAll(".removeFeed").forEach(b=>b.addEventListener("click",()=>{
    if(b.dataset.custom==="1"){
      store.set(store.get().filter(f=>f.url!==b.dataset.url));
    }else{
      const h = store.hidden();
      if(!h.includes(b.dataset.url)) h.push(b.dataset.url);
      store.setHidden(h);
    }
    refresh();
  }));
  document.getElementById("resetFeeds").style.display = store.hidden().length ? "" : "none";
}

let busy = false;
async function refresh(){
  if(busy) return; busy = true;
  const btn = document.getElementById("refreshBtn"), st = document.getElementById("status");
  btn.disabled = true; st.textContent = "Henter nyheter …";
  try{
    const results = await Promise.all(feeds().map(fetchFeed));
    render(results);
    st.textContent = "Sist oppdatert " + new Date().toLocaleTimeString("nb-NO",{hour:"2-digit",minute:"2-digit"});
  }catch(e){ st.textContent = "Noe gikk galt: " + e; }
  finally{ btn.disabled = false; busy = false; }
}

document.getElementById("dateLine").textContent =
  new Date().toLocaleDateString("nb-NO",{weekday:"long", day:"numeric", month:"long", year:"numeric"});
document.getElementById("refreshBtn").addEventListener("click", refresh);
document.getElementById("resetFeeds").addEventListener("click", ()=>{ store.setHidden([]); refresh(); });
document.getElementById("toggleAdd").addEventListener("click", ()=>{
  const f = document.getElementById("addForm");
  f.style.display = f.style.display==="flex" ? "none" : "flex";
});
document.getElementById("addForm").addEventListener("submit", e=>{
  e.preventDefault();
  const name = document.getElementById("feedName").value.trim();
  const url  = document.getElementById("feedUrl").value.trim();
  if(!name || !url) return;
  const list = store.get();
  if(list.some(f=>f.url===url) || DEFAULT_FEEDS.some(f=>f.url===url)) return;
  list.push({name, url, custom:true});
  store.set(list);
  e.target.reset();
  document.getElementById("addForm").style.display = "none";
  refresh();
});
refresh();
</script>
</body>
</html>
